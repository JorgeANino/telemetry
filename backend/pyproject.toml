[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [".venv", "telemetry.db", "__pycache__"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
  "E501",  # line length is enforced by formatting, not lint
  "B008",  # FastAPI's idiomatic `Depends(...)` lives in default-arg position
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # asserts in tests
